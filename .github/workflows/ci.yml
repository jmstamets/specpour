name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_VERSION: "10.0.x"
  FLUTTER_VERSION: "3.44.6"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

# T184 (fail-open sweep): GitHub's DEFAULT Linux shell for run steps is
# `bash -e {0}` — WITHOUT pipefail — so `cmd | tee log` masks cmd's failure
# behind tee's success (confirmed empirically: `false | tee` exits 0 under
# the default, 1 under explicit `shell: bash`, which GH invokes as
# `bash --noprofile --norc -eo pipefail {0}`). The two piped steps here
# (backend-tests, dependency-scan) were surviving on their grep guards alone;
# this makes the pipeline exit code itself load-bearing again everywhere.
defaults:
  run:
    shell: bash

jobs:
  # --- Backend: build (analyzers + treat-warnings-as-errors are enforced via
  # backend/Directory.Build.props, so a clean build already gates code style). ---
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore backend/SpecPour.slnx
      - run: dotnet build backend/SpecPour.slnx --no-restore -c Release

  # --- Backend: the four CI merge-gate suites (Principle I), run separately so a
  # failure in one doesn't hide the others. Acceptance/Contract/Integration use
  # Testcontainers against real PostgreSQL — the ubuntu-latest runner's Docker
  # daemon provides that. Acceptance/Contract also shell out to the built
  # MigrationRunner.dll (T026/T027) rather than duplicating its migrator-ordering
  # list, and Contract shells out to `npx @redocly/cli bundle` (T027) the same way
  # client-regen-drift-check already does — ubuntu-latest ships Node.js, no explicit
  # setup-node step needed, matching that job. Each matrix job is a fresh runner (no
  # shared filesystem with backend-build despite `needs:`), so the whole solution is
  # built here too, not just the one suite's own project. ---
  backend-tests:
    needs: backend-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [Acceptance, Contract, Integration, Unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet build backend/SpecPour.slnx -c Release
      - name: Run ${{ matrix.suite }} suite
        run: |
          dotnet test backend/tests/${{ matrix.suite }} -c Release --no-build 2>&1 | tee test-output.log
          # Defense-in-depth (2026-07-16 fail-open audit): no --filter is used
          # here, so the confirmed "0 tests matched a filter -> exit 0" mode
          # isn't reachable today, but a genuinely empty test project is a
          # separate, unconfirmed code path in dotnet test. Require evidence
          # that a nonzero number of tests actually ran, not just "no failure."
          if ! grep -qE "Passed!.*Total: *[1-9]" test-output.log; then
            echo "::error::No evidence that any tests actually ran in ${{ matrix.suite }} — treating as inconclusive, not clean."
            exit 1
          fi

  # --- Frontend: analyzer + formatting gate (mirrors T006's local commands). ---
  frontend-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - working-directory: frontend/app
        run: flutter pub get
      - working-directory: frontend/app
        run: flutter analyze
      - working-directory: frontend/app
        run: dart format --output=none --set-exit-if-changed .

  # --- Frontend: unit/widget suite (no device required). ---
  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - working-directory: frontend/app
        run: flutter pub get
      - working-directory: frontend/app
        run: flutter test

  # --- Frontend: client acceptance flows (quickstart.md: `flutter test
  # integration_test`). The `integration_test` package doesn't support web or
  # Linux-desktop devices, so this runs against an Android emulator — Android is
  # one of the plan's three first-class target platforms. ---
  frontend-integration-tests:
    runs-on: ubuntu-latest
    # 2026-07-15, first real CI run: this job hung for 1h+ with no timeout and
    # had to be cancelled by hand — ubuntu-latest hosted runners don't reliably
    # have KVM acceleration for the x86_64 emulator, so a cold boot can take far
    # longer than a working run ever should. Bounding it turns a silent multi-
    # hour hang into a visible, fast failure. Root fix (KVM/acceleration, or an
    # alternative runner) is tracked separately — see T180.
    #
    # 2026-07-16 (John): NOT in main's required-status-checks and marked
    # continue-on-error so it can't turn every run red-by-design until T180
    # lands — a permanently red pipeline trains everyone to ignore red, which
    # undoes exactly what wiring real CI in was for. Its own steps still show
    # true pass/fail; only the run-level rollup is spared.
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - working-directory: frontend/app
        run: flutter pub get
      - name: Run integration_test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: frontend/app
          script: flutter test integration_test

  # --- Frontend: the headless-Chrome browser-context smoke tier (T179), wired
  # in as a required CI check per T168's re-opened mandate (2026-07-15): every
  # green-but-dead bug found this project (registration T169, MFA enroll T175,
  # sign-in stranding T176) only showed up in a real browser, never in
  # unit/widget/Android-integration tests. ubuntu-latest ships Chrome, so this
  # doesn't hit frontend-integration-tests' KVM problem — no emulator involved.
  frontend-web-browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - working-directory: frontend/app
        run: flutter pub get
      - name: Start backend stack (postgres/minio/otel/smtp4dev/migrations/api)
        run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5001/health/live > /dev/null; then
              echo "API is up."
              exit 0
            fi
            sleep 2
          done
          echo "::error::API never became healthy within 120s."
          docker compose logs
          exit 1
      - name: Run the browser-context auth smoke set
        run: scripts/run-web-integration-tests.sh
      - name: Run the cross-tab election mechanism test (T177 #100)
        run: scripts/run-web-integration-tests.sh integration_test/web_multitab_test.dart
      - name: Run session-persistence + revocation-linkage tests (T177 #101)
        run: scripts/run-web-integration-tests.sh integration_test/web_session_persistence_test.dart
      - name: Run 90-day-cap-expiry test (T177 #101(c))
        run: scripts/run-cap-expiry-test.sh
      - name: Run data-export download test (T178)
        run: scripts/run-export-download-test.sh
      - name: Run frozen-tab refresh hardening test (T177 follow-up)
        run: scripts/run-web-integration-tests.sh integration_test/web_frozen_tab_test.dart
      - name: Docker logs (always, for diagnosis)
        if: always()
        run: docker compose logs

  # --- Generated client must never drift from the authored OpenAPI document
  # (Principle II hand-edit prohibition — T008). ---
  client-regen-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: scripts/check-client-drift.sh

  # --- Dependency scanning: fail on known-vulnerable NuGet and pub packages. ---
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: NuGet vulnerable-package scan
        run: |
          dotnet restore backend/SpecPour.slnx
          dotnet list backend/SpecPour.slnx package --vulnerable --include-transitive 2>&1 | tee vulnerable.log
          # Fail closed, not open: "The following sources were used" only appears
          # when the advisory-feed query actually completed. Its absence means the
          # scan was inconclusive (network/feed issue) and must not be read as
          # "no vulnerabilities" (2026-07-15: this is exactly how a real MailKit/
          # MimeKit CVE pair went undetected locally for weeks).
          if ! grep -q "The following sources were used" vulnerable.log; then
            echo "::error::NuGet vulnerability scan did not complete (no source query recorded) — treating as inconclusive, not clean. See log above."
            exit 1
          fi
          if grep -q "has the following vulnerable packages" vulnerable.log; then
            echo "::error::Vulnerable NuGet packages found (see log above)."
            exit 1
          fi
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: pub outdated (advisory — informational only)
        working-directory: frontend/app
        run: |
          flutter pub get
          dart pub outdated || true

  # --- Container scanning: the built API image (docker-compose.yml's api service). ---
  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t specpour-api:ci -f backend/src/Api/Dockerfile backend
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: specpour-api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
