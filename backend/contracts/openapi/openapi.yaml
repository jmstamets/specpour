# Populated incrementally by per-story tasks via $ref — see tasks.md for the
# per-module path authoring schedule.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth2/OIDC access token issued by the identity module (OpenIddict,
        authorization code + refresh). Anonymous (guest) access is permitted on
        public read endpoints, subject to rate limiting (FR-004b).

  parameters:
    CursorParam:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor from a previous page's `nextCursor`.
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    # --- RFC 9457 problem+json (global error convention) ---
    ProblemDetails:
      type: object
      description: RFC 9457 problem details. Every non-2xx response uses this shape.
      properties:
        type:
          type: string
          format: uri-reference
          description: A URI identifying the problem type. "about:blank" if none is more specific.
        title:
          type: string
          description: Short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: A URI identifying the specific occurrence of the problem.
        correlationId:
          type: string
          description: Correlation ID propagated from request tracing (OTel), for support/debugging.
      required: [title, status]

    # --- Cursor pagination envelope (global convention) ---
    CursorPage:
      type: object
      description: >-
        Generic cursor-paginated envelope documenting the pagination convention.
        Per-endpoint response schemas MIRROR this shape as their own named schema
        with a concrete `items` type (e.g. notifications.yaml's InboxPage) rather
        than allOf-composing this one: the open `items: {}` here maps to built_value
        JsonObject in the dart-dio generator, and allOf-merging it into a typed page
        produces synthesized models with missing imports (broken generated code).
      properties:
        items:
          type: array
          items: {}
        nextCursor:
          type: [string, "null"]
          description: Pass as `cursor` to fetch the next page; null when no further pages exist.
      required: [items]

  responses:
    ProblemResponse:
      description: An error response in RFC 9457 problem+json format.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    UnauthorizedResponse:
      description: >-
        Missing or invalid bearer token. For guest-gated actions, `detail` carries
        a sign-in prompt payload preserving the caller's original intent so the
        client can resume the action post-signup.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
