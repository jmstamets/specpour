openapi: 3.1.0
info:
  title: SpecPour API
  version: "1.0"
  description: >-
    Contract-first REST surface for SpecPour (constitution Principle II). This
    document is the reviewed source of truth: server contract tests validate the
    running API against it, and the Dart client (frontend/packages/api_client/) is
    generated from it — never hand-edited (see scripts/generate-client.sh).


    Per-module path documents are authored incrementally alongside their
    implementation tasks and merged here via `$ref` (see contracts/api-v1-surface.md
    for the full planned surface by module). Breaking changes require a new
    `/api/v2` document plus a deprecation window, per Principle II.


    **Sensitive-PII invariant**: no schema in this document may expose a raw
    `dateOfBirth` field except the `MeExport` schema returned by `GET /me/export`
    (the sole raw-DOB surface, FR-002b/SC-017). Every other authenticated or public
    schema exposes only derived predicates (e.g. `isOfLegalDrinkingAge`) or a
    verified-status flag. Contract tests enforce this invariant across the whole
    document — see backend/tests/Contract/.

servers:
  - url: /api/v1
    description: Default (versioned path; host varies by environment)

security:
  - {}
  - bearerAuth: []

