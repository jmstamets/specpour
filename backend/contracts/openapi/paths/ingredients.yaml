ingredients:
  get:
    operationId: listIngredients
    tags: [ingredients]
    summary: Browse ingredients (FR-014)
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: category
        in: query
        schema: { type: string }
      - name: scope
        in: query
        schema: { type: string, enum: [personal] }
        description: >-
          T059/T063 "my library" facet (the recipe editor's ingredient picker
          needs the caller's own house-made/personal ingredients, not just
          curated public ones). Requires an authenticated caller (401 otherwise).
      - $ref: '../openapi.yaml#/components/parameters/CursorParam'
      - $ref: '../openapi.yaml#/components/parameters/LimitParam'
    responses:
      '200':
        description: A page of matching ingredients.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientPage'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
  post:
    operationId: createIngredient
    tags: [ingredients]
    summary: Author an ingredient in the caller's personal or bar library, optionally house-made (T059, FR-012/FR-017)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateIngredientRequest'
    responses:
      '201':
        description: The created ingredient.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientAuthor'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

ingredientById:
  get:
    operationId: getIngredient
    tags: [ingredients]
    summary: Get an ingredient's full detail, including allergen attributes (FR-016)
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The ingredient's full detail.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientDetail'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
  put:
    operationId: updateIngredient
    tags: [ingredients]
    summary: Update one of the caller's own authored ingredients (T059, FR-012/FR-017)
    description: >-
      Rejects (400) a house-made defining recipe change that would transitively
      include this ingredient itself (FR-017's circular-reference edge case).
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateIngredientRequest'
    responses:
      '200':
        description: The updated ingredient.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientAuthor'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
  delete:
    operationId: deleteIngredient
    tags: [ingredients]
    summary: Delete one of the caller's own authored ingredients (T059)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: The ingredient was deleted.
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

ingredientRecipes:
  get:
    operationId: getIngredientRecipes
    tags: [ingredients]
    summary: Recipes using this ingredient, hierarchy-aware (T155, FR-014a)
    description: >-
      A class-level ingredient (e.g. "Rum") lists recipes using it or any
      descendant ("Aged Rum", "White Rum", ...) — mirrors FR-024's
      equipment-to-recipes linking. Unpaginated: a single ingredient's usage
      list is small at V1 scale.
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Recipes using this ingredient or a descendant.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientRecipes'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

components:
  schemas:
    IngredientSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        parentId: { type: [string, "null"], format: uuid }
        parentName: { type: [string, "null"], description: "Resolved parent-ingredient name for hierarchy display (contract sweep)." }
      required: [id, name]
    IngredientPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/IngredientSummary' }
        nextCursor: { type: [string, "null"] }
      required: [items]
    IngredientDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        parentId: { type: [string, "null"], format: uuid }
        parentName: { type: [string, "null"], description: "Resolved parent-ingredient name (contract sweep)." }
        sources: { type: array, items: { type: string } }
        description: { type: [string, "null"] }
        abvPercent: { type: [number, "null"] }
        allergens: { type: array, items: { type: string } }
        definingRecipeId: { type: [string, "null"], format: uuid }
        definingRecipeName: { type: [string, "null"], description: "Resolved defining-recipe name for house-made ingredients (contract sweep)." }
        yieldQuantity: { type: [number, "null"] }
        yieldUnit: { type: [string, "null"] }
        shelfLife: { type: [string, "null"], description: "ISO 8601 duration, when this is a house-made ingredient." }
        storageInstructions: { type: [string, "null"] }
      required: [id, name, sources, allergens]
    IngredientRecipeRef:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
      required: [id, name]
    IngredientRecipes:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/IngredientRecipeRef' }
      required: [items]
    CreateHouseMadeRequest:
      type: object
      description: FR-017 — a house-made ingredient's defining recipe, yield, shelf life, and storage instructions.
      properties:
        definingRecipeId: { type: string, format: uuid }
        yieldQuantity: { type: number }
        yieldUnit: { type: string }
        shelfLifeDays: { type: integer }
        storageInstructions: { type: string }
      required: [definingRecipeId, yieldQuantity, yieldUnit, shelfLifeDays, storageInstructions]
    CreateIngredientRequest:
      type: object
      description: >-
        T059, FR-012/FR-014/FR-017. libraryScope "bar" requires venueId, verified as
        owned by the caller (403 otherwise). categoryId defaults to a fixed system
        fallback category when omitted. Newly authored ingredients always start
        private (FR-008b).
      properties:
        name: { type: string }
        libraryScope: { type: string, enum: [personal, bar] }
        venueId: { type: [string, "null"], format: uuid }
        categoryId: { type: [string, "null"], format: uuid }
        parentId: { type: [string, "null"], format: uuid }
        abvPercent: { type: [number, "null"] }
        sources: { type: [array, "null"], items: { type: string } }
        description: { type: [string, "null"] }
        houseMade:
          oneOf:
            - $ref: '#/components/schemas/CreateHouseMadeRequest'
            - type: "null"
      required: [name, libraryScope]
    UpdateIngredientRequest:
      type: object
      properties:
        name: { type: string }
        categoryId: { type: [string, "null"], format: uuid }
        parentId: { type: [string, "null"], format: uuid }
        abvPercent: { type: [number, "null"] }
        sources: { type: [array, "null"], items: { type: string } }
        description: { type: [string, "null"] }
        houseMade:
          oneOf:
            - $ref: '#/components/schemas/CreateHouseMadeRequest'
            - type: "null"
      required: [name]
    HouseMade:
      type: object
      properties:
        definingRecipeId: { type: string, format: uuid }
        definingRecipeName: { type: [string, "null"] }
        yieldQuantity: { type: number }
        yieldUnit: { type: string }
        shelfLifeDays: { type: integer }
        storageInstructions: { type: string }
      required: [definingRecipeId, yieldQuantity, yieldUnit, shelfLifeDays, storageInstructions]
    IngredientAuthor:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        libraryScope: { type: string, enum: [personal, bar] }
        venueId: { type: [string, "null"], format: uuid }
        categoryId: { type: string, format: uuid }
        parentId: { type: [string, "null"], format: uuid }
        abvPercent: { type: [number, "null"] }
        sources: { type: array, items: { type: string } }
        description: { type: [string, "null"] }
        visibility: { type: string, enum: [private, public] }
        houseMade:
          oneOf:
            - $ref: '#/components/schemas/HouseMade'
            - type: "null"
      required: [id, name, libraryScope, categoryId, sources, visibility]
