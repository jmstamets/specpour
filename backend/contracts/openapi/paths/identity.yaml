register:
  post:
    operationId: registerAccount
    tags: [identity]
    summary: Email/password registration with DOB capture and underage rejection (FR-001/FR-002/FR-002c, T047)
    description: >-
      Anonymous. Rejects underage attempts with 403 and persists nothing (no DOB, no
      identifying record of the attempt) — FR-002c. On success, establishes the
      caller's cookie session (ADR-0003); the client then completes the standard
      authorization-code+PKCE exchange against /connect/authorize and /connect/token
      to obtain API access/refresh tokens — this endpoint never returns a token
      directly.
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      '201':
        description: Account created; cookie session established.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthAccount'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '403':
        description: Underage registration attempt — rejected, nothing persisted (FR-002c).
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ProblemDetails'

externalChallenge:
  get:
    operationId: challengeExternalSignIn
    tags: [identity]
    summary: Start social sign-in with a provider (T049)
    description: >-
      Anonymous. A real browser-redirect OAuth handshake, not a "submit a token you
      already have" endpoint — redirects to the provider's own consent screen. The
      client opens this URL in a system browser/tab (not a WebView — providers
      discourage or block WebView-embedded sign-in) and waits for redirectUri to be
      hit. redirectUri receives requiresMfa=true|false on success, or
      needsDateOfBirth=true when this is a brand-new account (FR-002 requires a date
      of birth for every registration method — the caller must then call POST
      /auth/external/complete-registration), or error=external_auth_failed.
    security:
      - {}
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, apple, microsoft] }
      - name: redirectUri
        in: query
        required: true
        schema: { type: string }
        description: Where the browser ends up when the whole flow (including any DOB completion) is done.
    responses:
      '302':
        description: Redirect to the provider's consent screen.
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

externalCallback:
  get:
    operationId: externalSignInCallback
    tags: [identity]
    summary: Provider redirect target — not called directly by clients (T049)
    security:
      - {}
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
    responses:
      '302':
        description: Redirect back to the redirectUri supplied to the challenge step.

externalCompleteRegistration:
  post:
    operationId: completeExternalRegistration
    tags: [identity]
    summary: Finish a new account after social sign-in supplied no date of birth (T049)
    description: >-
      Anonymous — call this after the callback redirected with needsDateOfBirth=true.
      Reads the pending external identity from the short-lived cookie the callback
      step left in place; there is nothing else to authenticate this call with yet.
      Same FR-002c underage handling as POST /auth/register: nothing is persisted on
      rejection.
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CompleteExternalRegistrationRequest'
    responses:
      '201':
        description: Account created; cookie session established.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthAccount'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '403':
        description: Underage registration attempt — rejected, nothing persisted (FR-002c).
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ProblemDetails'

login:
  post:
    operationId: login
    tags: [identity]
    summary: Email/password sign-in, establishing the cookie session (T047)
    description: >-
      Anonymous. On success, establishes the caller's cookie session (ADR-0003); the
      client then completes the standard authorization-code+PKCE exchange to obtain
      API access/refresh tokens, same as registration.
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: >-
          Either a completed sign-in (requiresMfa=false, user fields populated) or an
          MFA challenge (requiresMfa=true, user fields null) — call POST
          /auth/login/mfa with a TOTP code to finish.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginResult'
      '401':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

loginMfa:
  post:
    operationId: loginMfa
    tags: [identity]
    summary: Complete a sign-in that requiresMfa (T050)
    description: >-
      Anonymous (the caller isn't authenticated yet — the interim state is carried by
      a short-lived cookie login set, not a bearer token). Call this after a login
      response with requiresMfa=true, submitting the current 6-digit code from the
      caller's authenticator app.
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginMfaRequest'
    responses:
      '200':
        description: Signed in; cookie session established.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthAccount'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

recoveryRequest:
  post:
    operationId: requestAccountRecovery
    tags: [identity]
    summary: Request account recovery (T050, FR — lost-credential recovery)
    description: >-
      Anonymous. Always returns 202 regardless of whether the email matches an
      account, to avoid account enumeration. If it matches, an email with a recovery
      code is sent via the notifications email channel.
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecoveryRequest'
    responses:
      '202':
        description: Recovery request accepted (irrespective of whether the account exists).

recoveryConfirm:
  post:
    operationId: confirmAccountRecovery
    tags: [identity]
    summary: Complete account recovery with the emailed code and a new password (T050)
    security:
      - {}
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecoveryConfirmRequest'
    responses:
      '200':
        description: Password reset; the caller can now sign in with the new password.
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

meMfa:
  get:
    operationId: getMfaStatus
    tags: [identity]
    summary: Get the caller's TOTP MFA enrollment status (T050)
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Current MFA status.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaStatus'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
  post:
    operationId: enrollOrConfirmMfa
    tags: [identity]
    summary: Start or confirm TOTP MFA enrollment (T050)
    description: >-
      Two-phase over a single endpoint: an empty/no-code body starts enrollment
      (issues a new secret + otpauth:// URI for the caller's authenticator app); a
      body carrying the 6-digit code confirms the most recently issued secret and
      enables MFA. The secret/URI are returned only from the start-enrollment
      response; the one-time backup-code set (T163) is returned only from the
      response that actually enables MFA. Neither is ever shown again afterward —
      POST /me/mfa/backup-codes issues a fresh set if the caller needs one later.
    security:
      - bearerAuth: []
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnrollMfaRequest'
    responses:
      '200':
        description: Enrollment started (secret issued) or confirmed (enabled).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaEnrollment'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
  delete:
    operationId: disableMfa
    tags: [identity]
    summary: Disable TOTP MFA (T050)
    description: >-
      Also clears any backup codes (T163) — they're meaningless without an active
      enrollment.
    security:
      - bearerAuth: []
    responses:
      '204':
        description: MFA disabled (idempotent — also 204 if it was never enabled).
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meMfaBackupCodes:
  post:
    operationId: regenerateMfaBackupCodes
    tags: [identity]
    summary: Regenerate the caller's MFA backup codes (T163)
    description: >-
      Invalidates every prior backup code (used or not) and issues a fresh set of
      10. Requires MFA to already be enabled — there is nothing to recover into
      otherwise. Codes are shown exactly once, in this response.
    security:
      - bearerAuth: []
    responses:
      '200':
        description: A fresh set of one-time backup codes.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupCodes'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meSessions:
  get:
    operationId: listMySessions
    tags: [identity]
    summary: List the caller's active sessions/devices (T051)
    description: >-
      A "session" is one OpenIddict authorization — created the first time a device
      completes the PKCE exchange, refreshed on every subsequent token refresh.
      Revoked sessions are omitted (not just flagged) since there is nothing further
      the caller can do with one.
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The caller's active sessions, most recently active first.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionList'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meSessionById:
  delete:
    operationId: revokeMySession
    tags: [identity]
    summary: Revoke a session/device (T051)
    description: >-
      Revokes the underlying OpenIddict authorization directly — the whole
      refresh-token family for that device stops working immediately, not just this
      one call's session-list visibility.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: Session revoked.
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

meExport:
  get:
    operationId: exportMyAccount
    tags: [identity]
    summary: Export the caller's account data (T053)
    description: >-
      The sole surface anywhere in the platform that returns the raw date of birth
      (FR-002b/SC-017) — every call is audit-logged (identity.dob_exported).
    security:
      - bearerAuth: []
    responses:
      '200':
        description: The caller's full account export.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeExport'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meById:
  delete:
    operationId: deleteMyAccount
    tags: [identity]
    summary: Delete the caller's account (T053)
    description: >-
      Hard-deletes the account immediately (self-service path) — the same
      AccountDeletionService used by T052's grace-period-expiry background job.
      Cascades to MFA enrollment/backup codes/sessions via real foreign keys;
      publishes AccountDeleted for the future Community module's public-attribution
      anonymization.
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Account deleted.
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meDeactivate:
  post:
    operationId: deactivateMyAccount
    tags: [identity]
    summary: Deactivate the caller's account (T052)
    description: >-
      Signs the account out of every active session/device immediately. Retained for
      an operator-configurable grace period (default 12 months, FR-003) during which
      the caller can reactivate; a warning is sent before expiry, after which the
      account is automatically deleted via the same path as DELETE /me.
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Account deactivated.
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

meReactivate:
  post:
    operationId: reactivateMyAccount
    tags: [identity]
    summary: Reactivate the caller's deactivated account (T052)
    description: >-
      Only meaningful once the caller has a fresh, valid bearer token — deactivation
      revokes every prior session, so reactivating requires signing in again first.
    security:
      - bearerAuth: []
    responses:
      '204':
        description: Account reactivated.
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 12 }
        displayName: { type: string }
        dateOfBirth:
          type: string
          format: date
          description: >-
            Accepted as input only — never stored in plaintext (FR-002b) and never
            echoed back in this or any other response.
        unitPreference: { type: string, enum: [Milliliters, Ounces, Centiliters] }
        locale: { type: string }
      required: [email, password, displayName, dateOfBirth]
    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
      required: [email, password]
    AuthAccount:
      type: object
      description: >-
        Deliberately minimal — no dateOfBirth field (sensitive-PII invariant, see
        this document's top-level description) and no token (ADR-0003: tokens come
        from the standard /connect/token exchange, never from these endpoints).
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
      required: [userId, email, displayName]
    CompleteExternalRegistrationRequest:
      type: object
      properties:
        dateOfBirth:
          type: string
          format: date
          description: Same input-only, never-echoed-back handling as RegisterRequest.dateOfBirth.
        displayName: { type: string, description: Used only if the provider didn't share a name. }
        unitPreference: { type: string, enum: [Milliliters, Ounces, Centiliters] }
        locale: { type: string }
      required: [dateOfBirth, displayName]
    LoginResult:
      type: object
      description: User fields are null when requiresMfa is true — see the login operation description.
      properties:
        requiresMfa: { type: boolean }
        userId: { type: [string, "null"], format: uuid }
        email: { type: [string, "null"], format: email }
        displayName: { type: [string, "null"] }
      required: [requiresMfa]
    LoginMfaRequest:
      type: object
      properties:
        code: { type: string, description: The current 6-digit TOTP code. }
      required: [code]
    RecoveryRequest:
      type: object
      properties:
        email: { type: string, format: email }
      required: [email]
    RecoveryConfirmRequest:
      type: object
      properties:
        email: { type: string, format: email }
        token: { type: string, description: The recovery code from the account-recovery email. }
        newPassword: { type: string, format: password, minLength: 12 }
      required: [email, token, newPassword]
    MfaStatus:
      type: object
      properties:
        enabled: { type: boolean }
        method: { type: [string, "null"], enum: [totp, null] }
      required: [enabled]
    EnrollMfaRequest:
      type: object
      description: Omit code (or send an empty body) to start enrollment; include it to confirm.
      properties:
        code: { type: [string, "null"] }
    MfaEnrollment:
      type: object
      description: >-
        secret/otpAuthUri are populated only on the start-enrollment response
        (enabled=false); backupCodes only on the confirm response that actually sets
        enabled=true (T163) — none of the three is ever shown again afterward.
      properties:
        enabled: { type: boolean }
        secret: { type: [string, "null"] }
        otpAuthUri: { type: [string, "null"] }
        backupCodes:
          type: [array, "null"]
          items: { type: string }
      required: [enabled]
    BackupCodes:
      type: object
      properties:
        backupCodes:
          type: array
          items: { type: string }
      required: [backupCodes]
    Session:
      type: object
      description: >-
        deviceDescription is the raw User-Agent header captured at token issuance —
        best-effort, not a parsed device/OS model.
      properties:
        id: { type: string, format: uuid }
        deviceDescription: { type: string }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
      required: [id, deviceDescription, createdAt, lastSeenAt]
    SessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
      required: [sessions]
    MeExport:
      type: object
      description: >-
        The sole schema in this document allowed a raw dateOfBirth field (see this
        document's top-level description and SensitivePiiInvariantTests's allowlist).
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        dateOfBirth: { type: string, format: date }
        unitPreference: { type: string, enum: [Milliliters, Ounces, Centiliters] }
        locale: { type: string }
        createdAt: { type: string, format: date-time }
        mfaEnabled: { type: boolean }
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        externalLoginProviders:
          type: array
          items: { type: string }
      required:
        - userId
        - email
        - displayName
        - dateOfBirth
        - unitPreference
        - locale
        - createdAt
        - mfaEnabled
        - sessions
        - externalLoginProviders
