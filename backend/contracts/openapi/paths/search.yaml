search:
  get:
    operationId: search
    tags: [search]
    summary: Full-text search across recipes, ingredients, equipment, glossary terms, and articles (FR-049)
    description: >-
      Guest-accessible (FR-004b) unless `makeable=true` is used. Search itself owns
      no schema and has no opinion on content facets (T141 ADR) ‚Äî this endpoint
      returns entity references only (`entityType`/`entityId`); fetch the full
      record from that entity's own GET-by-id endpoint. Rating-facet composition
      lands in T149. `q` returning nothing is a pre-existing adapter limitation, not
      a facet bug ‚Äî this endpoint requires non-empty text; browsing (no `q`) is
      `GET /recipes`'s job, not this one's.
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: q
        in: query
        description: Free-text query (websearch_to_tsquery syntax).
        schema: { type: string }
      - name: uses
        in: query
        schema: { type: string, format: uuid }
        description: >-
          Hierarchy-aware "uses:<ingredient>" facet (T155/FR-050), narrowing
          results to recipes referencing the ingredient (or any descendant).
          Applied INSIDE the search adapter's own query, before pagination (T148 ‚Äî
          previously a post-filter that could shrink a page below `limit`).
      - name: makeable
        in: query
        schema: { type: string, enum: ["true"] }
        description: >-
          Makeable-from-inventory facet (T148, FR-050) ‚Äî bearer-only (401 if not
          authenticated). Narrows recipe-type results to the caller's own
          fully-makeable and near-miss recipes, applied the same way as `uses`
          (inside the adapter's query, before pagination). Combining `uses` and
          `makeable` intersects (both must match). Only public recipes are ever
          reachable via this endpoint (unlike `GET /recipes`'s `scope`/`makeable`,
          which also surfaces the caller's own private recipes) ‚Äî Search's index
          only ever carries public content.
      - $ref: '../openapi.yaml#/components/parameters/CursorParam'
      - $ref: '../openapi.yaml#/components/parameters/LimitParam'
    responses:
      '200':
        description: A page of search results, ranked by relevance.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchResultPage'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'

components:
  schemas:
    SearchResult:
      type: object
      properties:
        entityType:
          type: string
          enum: [recipe, ingredient, equipment, glossaryTerm, article]
        entityId: { type: string, format: uuid }
        title: { type: string }
        snippet: { type: [string, "null"] }
        score: { type: number }
      required: [entityType, entityId, title, score]
    SearchResultPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SearchResult' }
        nextCursor: { type: [string, "null"] }
      required: [items]
