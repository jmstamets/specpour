recipes:
  get:
    operationId: listRecipes
    tags: [catalog]
    summary: Browse/search recipes with content facets (FR-050)
    description: >-
      Guest-accessible (FR-004b). Only public/core recipes are returned by default —
      private personal-library recipes land with the personal-library story (US3),
      or via `scope`/`makeable`. The rating facet is still staged (T149); ABV-range
      filtering computes ABV per candidate at request time rather than from a
      stored column, since ABV is always derived, never persisted (data-model.md).
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: family
        in: query
        schema: { type: string }
        description: Family taxonomy key (e.g. "family.sour").
      - name: category
        in: query
        schema: { type: string }
      - name: tag
        in: query
        schema: { type: string }
      - name: flavorProfile
        in: query
        schema: { type: string }
      - name: equipment
        in: query
        schema: { type: string, format: uuid }
      - name: glassware
        in: query
        schema: { type: string, format: uuid }
      - name: ice
        in: query
        schema: { type: string }
      - name: uses
        in: query
        schema: { type: string, format: uuid }
        description: >-
          Hierarchy-aware "uses:<ingredient>" facet (T155/FR-050) — a class-level
          ingredient ID matches recipes using it or any descendant.
      - name: allergenExclude
        in: query
        schema: { type: string }
        description: Comma-separated allergen keys to exclude.
      - name: makeable
        in: query
        schema: { type: string, enum: ["true"] }
        description: >-
          Makeable-from-inventory facet (T148, FR-050) — bearer-only (401 if not
          authenticated). Includes both fully-makeable recipes and near-misses
          (one-away, naming the missing/substitutable line); the base recipe set for
          this facet spans public recipes AND the caller's own personal/bar recipes
          (a caller's own authored recipe can be makeable/near-miss too), composing
          with `scope` when both are given. Each returned recipe carries a
          `makeability` object with per-line detail.
      - name: source
        in: query
        schema: { type: string, enum: [core, personal, public] }
      - name: scope
        in: query
        schema: { type: string, enum: [personal, bar] }
        description: >-
          T058, FR-050 "my library" facet: the caller's own recipes in that library,
          regardless of visibility. Requires an authenticated caller (401 otherwise).
      - $ref: '../openapi.yaml#/components/parameters/CursorParam'
      - $ref: '../openapi.yaml#/components/parameters/LimitParam'
    responses:
      '200':
        description: A page of matching recipes.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipePage'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
  post:
    operationId: createRecipe
    tags: [catalog]
    summary: Author a recipe in the caller's personal or bar library (T058, FR-018)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateRecipeRequest'
    responses:
      '201':
        description: The created recipe.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeAuthor'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

recipeById:
  get:
    operationId: getRecipe
    tags: [catalog]
    summary: Get a recipe's full detail, including derived ABV/standard drinks/allergens (FR-022)
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The recipe's full detail.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeDetail'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
  put:
    operationId: updateRecipe
    tags: [catalog]
    summary: Update one of the caller's own authored recipes (T058, FR-018)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateRecipeRequest'
    responses:
      '200':
        description: The updated recipe.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeAuthor'
      '400':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'
  delete:
    operationId: deleteRecipe
    tags: [catalog]
    summary: Delete one of the caller's own authored recipes (T058, FR-018)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: The recipe was deleted.
      '401':
        $ref: '../openapi.yaml#/components/responses/UnauthorizedResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

concepts:
  get:
    operationId: listConcepts
    tags: [catalog]
    summary: Browse concept pages (FR-021)
    security:
      - {}
      - bearerAuth: []
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/CursorParam'
      - $ref: '../openapi.yaml#/components/parameters/LimitParam'
    responses:
      '200':
        description: A page of concept pages.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConceptPage'

conceptById:
  get:
    operationId: getConcept
    tags: [catalog]
    summary: Get a concept page with its approved variant recipes (FR-021)
    security:
      - {}
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The concept page and its variants.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConceptDetail'
      '404':
        $ref: '../openapi.yaml#/components/responses/ProblemResponse'

components:
  schemas:
    RecipeSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        primaryName: { type: string }
        familyKey: { type: [string, "null"] }
        makeability:
          description: Present only when `?makeable=true` was applied.
          oneOf:
            - { $ref: '#/components/schemas/RecipeMakeabilitySummary' }
            - type: "null"
      required: [id, primaryName]
    RecipeMakeabilitySummary:
      type: object
      description: >-
        matchQuality is a derived summary of lines (the loosest satisfied-line
        quality) — never independent truth. Null for near-miss entries (a near-miss
        has no single aggregate quality).
      properties:
        isNearMiss: { type: boolean }
        matchQuality:
          oneOf:
            - { $ref: './inventory.yaml#/components/schemas/MatchQuality' }
            - type: "null"
        lines:
          type: array
          items: { $ref: '#/components/schemas/RecipeMakeabilityLine' }
      required: [isNearMiss, matchQuality, lines]
    RecipeMakeabilityLine:
      type: object
      properties:
        requirementIngredientId: { type: string, format: uuid }
        requirementIngredientName: { type: [string, "null"] }
        matchQuality: { $ref: './inventory.yaml#/components/schemas/MatchQuality' }
        satisfiedByIngredientId: { type: [string, "null"], format: uuid }
        satisfiedByIngredientName: { type: [string, "null"] }
      required: [requirementIngredientId, matchQuality]
    RecipePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RecipeSummary' }
        nextCursor: { type: [string, "null"] }
      required: [items]
    RecipeIngredientLine:
      type: object
      properties:
        position: { type: integer }
        ingredientId: { type: string, format: uuid }
        ingredientName:
          type: [string, "null"]
          description: Resolved for display (FR-020); null only if the referenced ingredient can no longer be resolved.
        quantity: { type: number }
        unit: { type: string }
        purpose: { type: [string, "null"] }
        scalingRule: { type: string, enum: [Linear, Stepwise, OmitInBatch, AddFreshAtService] }
      required: [position, ingredientId, quantity, unit, scalingRule]
    RecipeDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        primaryName: { type: string }
        alternateNames: { type: array, items: { type: string } }
        familyKey: { type: [string, "null"] }
        categoryKeys: { type: array, items: { type: string } }
        flavorProfileKeys: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        ingredientLines:
          type: array
          items: { $ref: '#/components/schemas/RecipeIngredientLine' }
        instructions: { type: array, items: { type: string } }
        garnishes: { type: array, items: { type: string } }
        iceSpec: { type: string }
        glassware:
          type: array
          items: { $ref: '#/components/schemas/EquipmentRef' }
        equipment:
          type: array
          items: { $ref: '#/components/schemas/EquipmentRef' }
        creatorAttribution: { type: [string, "null"] }
        history: { type: [string, "null"] }
        notes: { type: [string, "null"] }
        abvPercent:
          type: number
          description: Derived — never stored, computed at read time from ingredient composition and method dilution (FR-022).
        standardDrinks: { type: number }
        allergens:
          type: array
          items: { type: string }
          description: Rolled up from ingredient allergen attributes, conservative for uncertain (FR-055).
      required: [id, primaryName, alternateNames, ingredientLines, instructions, iceSpec, glassware, equipment, abvPercent, standardDrinks, allergens]
    EquipmentRef:
      type: object
      description: A glassware/equipment reference with its resolved name (contract sweep). name is null only if the equipment can no longer be resolved.
      properties:
        id: { type: string, format: uuid }
        name: { type: [string, "null"] }
      required: [id]
    ConceptSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
      required: [id, name, description]
    ConceptPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ConceptSummary' }
        nextCursor: { type: [string, "null"] }
      required: [items]
    ConceptVariant:
      type: object
      properties:
        recipeId: { type: string, format: uuid }
        recipeName: { type: string }
        differentiatorText: { type: string }
      required: [recipeId, recipeName, differentiatorText]
    ConceptDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        variants:
          type: array
          items: { $ref: '#/components/schemas/ConceptVariant' }
      required: [id, name, description, variants]
    RecipeIngredientLineInput:
      type: object
      properties:
        ingredientId: { type: string, format: uuid }
        quantity: { type: number }
        unit: { type: string }
        purpose: { type: [string, "null"] }
        scalingRule: { type: string, enum: [Linear, Stepwise, OmitInBatch, AddFreshAtService] }
      required: [ingredientId, quantity, unit, scalingRule]
    CreateRecipeRequest:
      type: object
      description: >-
        T058, FR-018. libraryScope "bar" requires venueId, verified as owned by the
        caller (403 otherwise). Newly authored recipes always start private (FR-008b)
        — publishing is a separate, not-yet-built flow.
      properties:
        primaryName: { type: string }
        alternateNames: { type: [array, "null"], items: { type: string } }
        libraryScope: { type: string, enum: [personal, bar] }
        venueId: { type: [string, "null"], format: uuid }
        instructions: { type: [array, "null"], items: { type: string } }
        ingredientLines:
          type: [array, "null"]
          items: { $ref: '#/components/schemas/RecipeIngredientLineInput' }
        categoryIds: { type: [array, "null"], items: { type: string, format: uuid } }
        tags: { type: [array, "null"], items: { type: string } }
      required: [primaryName, libraryScope]
    UpdateRecipeRequest:
      type: object
      properties:
        primaryName: { type: string }
        alternateNames: { type: [array, "null"], items: { type: string } }
        instructions: { type: [array, "null"], items: { type: string } }
        ingredientLines:
          type: [array, "null"]
          items: { $ref: '#/components/schemas/RecipeIngredientLineInput' }
        categoryIds: { type: [array, "null"], items: { type: string, format: uuid } }
        tags: { type: [array, "null"], items: { type: string } }
      required: [primaryName]
    RecipeAuthor:
      type: object
      properties:
        id: { type: string, format: uuid }
        primaryName: { type: string }
        alternateNames: { type: array, items: { type: string } }
        libraryScope: { type: string, enum: [personal, bar] }
        venueId: { type: [string, "null"], format: uuid }
        instructions: { type: array, items: { type: string } }
        ingredientLines:
          type: array
          items: { $ref: '#/components/schemas/RecipeIngredientLine' }
        categoryIds: { type: array, items: { type: string, format: uuid } }
        tags: { type: array, items: { type: string } }
        visibility: { type: string, enum: [private, public] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, primaryName, alternateNames, libraryScope, instructions, ingredientLines, categoryIds, tags, visibility, createdAt, updatedAt]
