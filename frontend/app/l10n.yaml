# ARB-based i18n workflow (constitution Principle VII: all client strings keyed
# from first commit). Run `flutter gen-l10n` (or build, which triggers it via
# `generate: true` in pubspec.yaml) to regenerate lib/core/l10n/gen/.
arb-dir: lib/core/l10n/arb
template-arb-file: app_en.arb
output-dir: lib/core/l10n/gen
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
